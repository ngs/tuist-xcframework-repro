name: Build

on:
  push:
    branches: [main, tuist-4.147.0, fix/9723-patched-tuist]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Available Xcode versions:"
            ls -la /Applications | grep Xcode
            echo "Error: Xcode 26.x not found"
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Build patched Tuist from ngs/tuist
        run: |
          git clone --depth 1 --branch fix/9723-reproduce-xcframework-slice-selection-bug-fix \
            https://github.com/ngs/tuist.git /tmp/tuist
          cd /tmp/tuist
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app
          echo "Desired: Xcode_$(cat .xcode-version).app"
          XCODE_APP="/Applications/Xcode_$(cat .xcode-version).app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "Falling back to latest Xcode"
            XCODE_APP=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          fi
          sudo xcode-select -s "$XCODE_APP"
          swift --version
          swift build -c release --product tuist --replace-scm-with-registry
          sudo cp .build/release/tuist /usr/local/bin/tuist

      - name: Tuist install
        run: tuist install

      - name: Tuist cache
        run: tuist cache --external-only

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Build for simulator
        run: |
          xcodebuild build \
            -workspace XcframeworkRepro.xcworkspace \
            -scheme XcframeworkRepro \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
